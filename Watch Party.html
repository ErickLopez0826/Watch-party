<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch Party</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── TOKENS ─────────────────────────────────────── */
    :root {
      --bg-base:       #090909;
      --bg-elevated:   #101010;
      --bg-card:       #171717;
      --bg-input:      #1f1f1f;
      --text-primary:  #e8e8e8;
      --text-secondary:#737373;
      --text-dim:      #333333;
      --accent:        #E50914;
      --accent-hover:  #ff1420;
      --accent-glow:   rgba(229,9,20,0.22);
      --border:        rgba(255,255,255,0.07);
      --border-bright: rgba(255,255,255,0.13);
      --online:        #46d369;
      --radius-sm:     6px;
      --radius-md:     10px;
      --radius-lg:     14px;
      --font-display:  'Bebas Neue', sans-serif;
      --font-body:     'DM Sans', sans-serif;
      --density-gap:     16px;
      --density-padding: 22px;
    }

    /* Light mode */
    [data-theme="light"] {
      --bg-base:       #f2f2f2;
      --bg-elevated:   #ffffff;
      --bg-card:       #fafafa;
      --bg-input:      #ebebeb;
      --text-primary:  #0f0f0f;
      --text-secondary:#5a5a5a;
      --text-dim:      #b0b0b0;
      --border:        rgba(0,0,0,0.08);
      --border-bright: rgba(0,0,0,0.15);
      --accent-glow:   rgba(229,9,20,0.14);
    }

    /* Density */
    [data-density="compact"]  { --density-gap: 10px; --density-padding: 14px; }
    [data-density="spacious"] { --density-gap: 26px; --density-padding: 34px; }

    /* ── RESET ──────────────────────────────────────── */
    html, body, #root {
      height: 100%; width: 100%; overflow: hidden;
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
    }

    input, textarea, button { font-family: inherit; }
    input::placeholder, textarea::placeholder { color: var(--text-dim); }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }

    /* ── ANIMATIONS ─────────────────────────────────── */
    @keyframes wp-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.45; transform: scale(0.9); }
    }

    @keyframes wp-stream {
      0%   { background-position: 0% 0%; }
      50%  { background-position: 100% 100%; }
      100% { background-position: 0% 0%; }
    }

    /* ── SCREEN TRANSITION ─────────────────────────── */
    .wp-screen-enter {
      animation: wp-fadein 0.34s ease forwards;
    }
    @keyframes wp-fadein {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="wp-components.jsx"></script>
  <script type="text/babel" src="tweaks-panel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // ── Tweak defaults (JSON block — host patches between markers) ──
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "density": "normal",
      "accentColor": "#8B5CF6"
    }/*EDITMODE-END*/;

    const ROOM_CODE = 'ABC123';

    // ── Accent palette helper ────────────────────────────────────────
    function hexToRgb(hex) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},0.22)`;
    }

    function applyTokens(theme, density, accent) {
      const root = document.documentElement;
      root.setAttribute('data-theme', theme);
      root.setAttribute('data-density', density);
      root.style.setProperty('--accent', accent);
      root.style.setProperty('--accent-hover', accent);
      root.style.setProperty('--accent-glow', hexToRgb(accent));
    }

    // ── Screen indicator dots ────────────────────────────────────────
    const SCREENS = ['home', 'waiting', 'live', 'form', 'history'];
    const SCREEN_LABELS = {
      home: 'Inicio',
      waiting: 'Sala: Esperando',
      live: 'Sala: En Vivo',
      form: 'Guardar Sesión',
      history: 'Historial',
    };

    function NavDots({ current, onGo }) {
      return (
        <div style={{
          position: 'fixed', bottom: 18, left: '50%', transform: 'translateX(-50%)',
          display: 'flex', alignItems: 'center', gap: 10,
          background: 'rgba(0,0,0,0.55)', backdropFilter: 'blur(12px)',
          border: '1px solid var(--border-bright)',
          borderRadius: 40, padding: '8px 16px',
          zIndex: 900,
        }}>
          {SCREENS.map(s => (
            <button
              key={s}
              title={SCREEN_LABELS[s]}
              onClick={() => onGo(s)}
              style={{
                width: current === s ? 22 : 7,
                height: 7, borderRadius: 4, border: 'none', cursor: 'pointer',
                transition: 'all 0.25s ease',
                background: current === s ? 'var(--accent)' : 'var(--border-bright)',
                padding: 0,
              }}
            />
          ))}
        </div>
      );
    }

    // ── Root App ─────────────────────────────────────────────────────
    function App() {
      const [tweaks, setTweak] = useTweaks(TWEAK_DEFAULTS);
      const [screen, setScreen] = useState('home');

      // Apply CSS tokens whenever tweaks change
      useEffect(() => {
        applyTokens(
          tweaks.theme    || 'dark',
          tweaks.density  || 'normal',
          tweaks.accentColor || '#E50914'
        );
      }, [tweaks.theme, tweaks.density, tweaks.accentColor]);

      const go = (s) => setScreen(s);

      const renderScreen = () => {
        switch (screen) {
          case 'home':
            return (
              <HomeScreen
                key="home"
                onCreateRoom={() => go('waiting')}
                onJoinRoom={() => go('waiting')}
                onHistory={() => go('history')}
              />
            );
          case 'waiting':
            return (
              <WaitingRoomScreen
                key="waiting"
                roomCode={ROOM_CODE}
                onShare={() => go('live')}
                onLeave={() => go('home')}
                onHistory={() => go('history')}
              />
            );
          case 'live':
            return (
              <LiveRoomScreen
                key="live"
                roomCode={ROOM_CODE}
                onEndSession={() => go('form')}
                onLeave={() => go('home')}
              />
            );
          case 'form':
            return (
              <EndSessionScreen
                key="form"
                onSave={() => go('history')}
                onBack={() => go('live')}
              />
            );
          case 'history':
            return (
              <HistoryScreen
                key="history"
                onBack={() => go('home')}
              />
            );
          default:
            return null;
        }
      };

      return (
        <div style={{ height: '100vh', display: 'flex', flexDirection: 'column', overflow: 'hidden' }}>
          {/* Screen with key-driven re-mount for transition */}
          <div key={screen} className="wp-screen-enter" style={{ flex: 1, overflow: 'hidden', display: 'flex', flexDirection: 'column' }}>
            {renderScreen()}
          </div>

          {/* Navigation dots */}
          <NavDots current={screen} onGo={go} />

          {/* Tweaks panel */}
          <TweaksPanel>
            <TweakSection title="Apariencia">
              <TweakRadio
                label="Tema"
                value={tweaks.theme}
                options={[{ label: 'Oscuro', value: 'dark' }, { label: 'Claro', value: 'light' }]}
                onChange={v => setTweak('theme', v)}
              />
              <TweakRadio
                label="Densidad"
                value={tweaks.density}
                options={[
                  { label: 'Compacto', value: 'compact' },
                  { label: 'Normal',   value: 'normal'  },
                  { label: 'Espacioso',value: 'spacious'},
                ]}
                onChange={v => setTweak('density', v)}
              />
              <TweakColor
                label="Color de acento"
                value={tweaks.accentColor}
                options={['#E50914', '#3B82F6', '#8B5CF6', '#10B981', '#F59E0B']}
                onChange={v => setTweak('accentColor', v)}
              />
            </TweakSection>
            <TweakSection title="Pantalla actual">
              <TweakSelect
                label="Ir a pantalla"
                value={screen}
                options={SCREENS.map(s => ({ label: SCREEN_LABELS[s], value: s }))}
                onChange={v => go(v)}
              />
            </TweakSection>
          </TweaksPanel>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
